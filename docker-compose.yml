version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: reap
      POSTGRES_PASSWORD: reap
      POSTGRES_DB: cfo_agent
    volumes:
      - cfo_db_data:/var/lib/postgresql/data
      - ./migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reap -d cfo_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal-db:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.27.2
    depends_on:
      temporal-db:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_SEEDS: temporal-db
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.37.2
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8081:8080"

  embeddings:
    platform: linux/amd64
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    command: ["--model-id", "thenlper/gte-small", "--port", "80"]
    volumes:
      - hf_model_cache:/data
    ports:
      - "8082:80"

  api:
    image: golang:1.25
    working_dir: /app
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      POSTGRES_DSN: postgres://reap:reap@db:5432/cfo_agent?sslmode=disable
      TEMPORAL_ADDRESS: temporal:7233
      SERVER_PORT: ":8080"
      APP_MODE: ${APP_MODE:-test}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_BASE_URL: ${HF_BASE_URL:-https://router.huggingface.co/v1}
      HF_LLM_MODEL: ${HF_LLM_MODEL:-HuggingFaceTB/SmolLM2-1.7B-Instruct:hf-inference}
      EMBEDDINGS_URL: http://embeddings:80/embed
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command: ["go", "run", "./cmd/api"]
    ports:
      - "8080:8080"
    restart: unless-stopped

  worker:
    image: golang:1.25
    working_dir: /app
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      POSTGRES_DSN: postgres://reap:reap@db:5432/cfo_agent?sslmode=disable
      TEMPORAL_ADDRESS: temporal:7233
      APP_MODE: ${APP_MODE:-test}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_BASE_URL: ${HF_BASE_URL:-https://router.huggingface.co/v1}
      HF_LLM_MODEL: ${HF_LLM_MODEL:-HuggingFaceTB/SmolLM2-1.7B-Instruct:hf-inference}
      EMBEDDINGS_URL: http://embeddings:80/embed
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command: ["go", "run", "./cmd/worker"]
    restart: unless-stopped

volumes:
  cfo_db_data:
  temporal_db_data:
  hf_model_cache: